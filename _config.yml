title: WuEnergie — Ing.-Büro Jörg Wünnenberg
author: Jörg Wünnenberg
description: >-
  Energieberatung und Anlagentechnik aus einer Hand: Ich messe, analysiere und
  optimiere Energieflüsse direkt im Betrieb — damit Einsparungen tatsächlich
  erreicht werden.
url: https://wuenergie.de
lang: de
timezone: Europe/Berlin

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Plugins — auf der GitHub-Pages-Whitelist, kein Build-Schritt nötig.
# https://pages.github.com/versions/
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# jekyll-seo-tag: Autorenname für Twitter-Cards und verknüpfte Organisation.
social:
  name: Ing.-Büro Wünnenberg
  links:
    - https://wuennenberg.org/

# Default-OG-Bild für jede Seite. jekyll-seo-tag liest nur page.image, nicht
# site.image — deshalb über defaults in alle Seiten injizieren.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-image.png

# Dotfiles, Gemfile* und vendor/ werden bereits per Default ausgeschlossen.
# Nur projektfremde Top-Level-Dateien müssen hier explizit raus.
exclude:
  - README.md
  - CLAUDE.md
