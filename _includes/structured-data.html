{%- assign s = site.data.site -%}
{%- assign business_id = site.url | append: '/#business' -%}
{%- assign is_subpage = false -%}
{%- if page.url and page.url != '/' and page.url != '/404.html' -%}
  {%- assign is_subpage = true -%}
{%- endif -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "ProfessionalService",
      "@id": "{{ business_id }}",
      "name": {{ s.unternehmen | jsonify }},
      "alternateName": {{ s.marke | jsonify }},
      "url": "{{ site.url }}",
      "logo": "{{ site.url }}/favicon.svg",
      "image": "{{ site.url }}{{ s.og_image }}",
      "description": {{ s.social_description | strip_newlines | strip | jsonify }},
      "foundingDate": "{{ s.gegruendet }}",
      "founder": {
        "@type": "Person",
        "name": {{ s.inhaber | jsonify }}
      },
      "telephone": {{ s.telefon | jsonify }},
      "email": {{ s.email | jsonify }},
      "vatID": {{ s.ust_idnr | jsonify }},
      "address": {
        "@type": "PostalAddress",
        "streetAddress": {{ s.strasse | jsonify }},
        "postalCode": {{ s.plz | jsonify }},
        "addressLocality": {{ s.ort | jsonify }},
        "addressRegion": {{ s.region | jsonify }},
        "addressCountry": {{ s.land | jsonify }}
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": {{ s.geo_lat }},
        "longitude": {{ s.geo_lon }}
      },
      "areaServed": [
        {"@type": "Country", "name": "Deutschland"},
        {"@type": "Country", "name": "Schweiz"}
      ],
      "knowsAbout": {{ s.leistungen | map: 'name' | jsonify }},
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Leistungen",
        "itemListElement": [
          {%- for l in s.leistungen -%}
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": {{ l.name | jsonify }},
              "description": {{ l.beschreibung | jsonify }},
              "provider": { "@id": "{{ business_id }}" },
              "areaServed": [
                {"@type": "Country", "name": "Deutschland"},
                {"@type": "Country", "name": "Schweiz"}
              ]
            }
          }{% unless forloop.last %},{% endunless %}
          {%- endfor -%}
        ]
      },
      "sameAs": [
        {{ s.partner_marke.url | jsonify }}
      ]
    }{% if is_subpage %},
    {
      "@type": "BreadcrumbList",
      "@id": "{{ site.url }}{{ page.url }}#breadcrumbs",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Startseite",
          "item": "{{ site.url }}/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": {{ page.breadcrumb | default: page.title | jsonify }}
        }
      ]
    }{% endif %}
  ]
}
</script>
