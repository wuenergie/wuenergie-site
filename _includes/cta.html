<section class="cta" id="kontakt">
  <div class="container cta-inner">
    <h2>Unverbindlich sprechen</h2>
    <p class="cta-lede">Am schnellsten per E-Mail. Oder direkt ein 30-Minuten-Erstgespräch buchen — kostenfrei, ohne Verpflichtung.</p>
    <div class="cta-actions">
      <a class="btn btn-primary" href="mailto:{{ site.data.site.email }}">{{ site.data.site.email }}</a>
      <a class="btn btn-secondary" href="{{ site.data.site.cal_url }}" rel="noopener" target="_blank">30-Min-Termin buchen</a>
    </div>
    <p class="cta-note">Telefon: <a href="tel:{{ site.data.site.telefon_tel }}">{{ site.data.site.telefon }}</a></p>
  </div>
</section>
